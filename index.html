<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Workout Tracker v8.7 - Precision Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="autoSaveStatus">Last saved: Never</div>

    <div id="restTimerContainer">
        <div id="timerDisplay" style="font-size: 24px; font-weight: bold; margin-bottom: 5px;">00:00</div>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="startTimer(60)" class="btn" style="background:#4b5563; padding: 4px;">60s</button>
            <button onclick="stopTimer()" class="btn bg-red" style="padding: 4px;">Clr</button>
        </div>
    </div>

    <div id="volumeSummary">
        <div style="font-size: 8px; text-transform: uppercase; color: var(--text-muted);">Total Tonnage</div>
        <div id="totalVolumeDisplay" style="font-size: 16px; font-weight: bold; color: var(--green);">0 lbs</div>
    </div>

    <div class="container card">
        <h1 class="text-center" style="margin: 0;">Workout Tracker <span style="color: var(--gold);">v8.7</span></h1>

        <div style="background: rgba(55, 65, 81, 0.5); border: 1px solid var(--border-color); border-radius: 12px;">
            <button id="toggleFavBtn" style="width:100%; background:transparent; border:none; padding:12px; color:white; display:flex; justify-content:space-between; cursor:pointer; font-weight:bold; font-size:14px;">
                <span>⭐ Manage Favorites</span>
                <span id="favChevron">▼</span>
            </button>
            <div id="favoritesPanel" class="collapsed" style="padding:15px; border-top:1px solid var(--border-color);">
                <div id="favoritesGrid" class="grid" style="grid-template-columns: 1fr 1fr; gap: 8px; font-size: 10px;"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label style="font-size: 9px; text-transform: uppercase; font-weight: bold; color: var(--text-muted); display: block; margin-bottom: 4px;">Date</label>
                <input type="date" id="workoutDateInput" class="w-full">
            </div>
            <div>
                <label style="font-size: 9px; text-transform: uppercase; font-weight: bold; color: var(--text-muted); display: block; margin-bottom: 4px;">Split</label>
                <select id="workoutTypeSelect" class="w-full"></select>
            </div>
        </div>

        <div id="exercisesContainer" class="space-y-4"></div>

        <div class="flex" style="flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px;">
            <button id="addExerciseBtn" class="btn bg-blue" style="flex-grow: 1;">+ Add Exercise</button>
            <button id="sortExercisesBtn" class="btn bg-slate" style="flex-grow: 1;">⇅ Sort Order</button>
            <div class="w-full grid grid-cols-2 gap-2">
                <button id="loadLastBtn" class="btn bg-purple">↺ Load Last</button>
                <button id="saveCsvBtn" class="btn bg-green">💾 SAVE & SHARE</button>
            </div>
            <button id="importCsvBtn" class="btn bg-orange" style="width: 100%;">📂 Import CSV/JSON</button>
            <input type="file" id="csvFileInput" class="hidden" accept=".csv,.json">
        </div>

        <div id="exportAreaContainer" class="hidden">
            <div class="flex justify-between items-center">
                <span style="font-size: 10px; font-weight: bold; color: var(--blue);">CSV BACKUP (SHARE NOT SUPPORTED)</span>
                <button onclick="document.getElementById('exportAreaContainer').classList.add('hidden')" style="background:transparent; border:none; color:var(--text-muted);">✕</button>
            </div>
            <textarea id="csvOutputText" readonly onclick="this.select()"></textarea>
            <button class="btn bg-blue w-full" style="margin-top: 10px;" onclick="const t = document.getElementById('csvOutputText'); t.select(); document.execCommand('copy');">Copy to Clipboard</button>
        </div>

        <div style="margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid #374151;">
            <h2 style="font-size: 12px; text-align: center; color: var(--green); margin-top: 0; text-transform: uppercase;">Recent Sessions</h2>
            <div style="overflow-x: auto;">
                <table>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>

        <p style="text-align:center; font-size: 10px; color: var(--text-muted);">v8.7 JSON Edition</p>
    </div>

    <script>
        let ALL_EXERCISES = [];
        let EXERCISE_GROUPS = {};
        let workoutTypes = [];

        async function loadExerciseData() {
            try {
                const response = await fetch('exercise_list.json');
                const data = await response.json();
                workoutTypes = data.workout_types;
                ALL_EXERCISES = data.exercises.map(ex => `${ex.id}-${ex.name}`);
                EXERCISE_GROUPS = { 'Full Body': ALL_EXERCISES };

                data.workout_types.forEach(type => {
                    if (type !== 'Full Body') {
                        EXERCISE_GROUPS[type] = data.exercises
                            .filter(ex => ex.groups.includes(type))
                            .map(ex => `${ex.id}-${ex.name}`);
                    }
                });

                const splitSelect = document.getElementById('workoutTypeSelect');
                splitSelect.innerHTML = '';
                workoutTypes.forEach(type => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = type;
                    splitSelect.appendChild(opt);
                });

                if (!localStorage.getItem('workoutFavorites')) {
                    favorites = [...ALL_EXERCISES];
                    localStorage.setItem('workoutFavorites', JSON.stringify(favorites));
                }

                renderFavoritesGrid();
            } catch (err) {
                console.error("Error loading exercises:", err);
            }
        }

        function getTodayLocal() { return new Date().toLocaleDateString('en-CA'); }
        const numSort = (a, b) => a.localeCompare(b, undefined, { numeric: true });
        let favorites = JSON.parse(localStorage.getItem('workoutFavorites')) || [];
        let sessionHistory = JSON.parse(localStorage.getItem('workoutVolumeHistory')) || [];
        let personalBests = JSON.parse(localStorage.getItem('personalBests')) || {};
        let exerciseMemory = JSON.parse(localStorage.getItem('exerciseMemory')) || {};

        function calculatePlates(plateWeight) {
            if (plateWeight <= 0) return "";
            let perSide = plateWeight / 2;
            const plates = [45, 25, 10, 5, 2.5];
            let result = [];
            plates.forEach(p => {
                let count = Math.floor(perSide / p);
                if (count > 0) { result.push(`${count}x${p}`); perSide -= count * p; }
            });
            return result.length ? `Side: ${result.join(', ')}` : "";
        }

        function refreshRowCalculation(inputEl) {
            const row = inputEl.closest('.set-row');
            if (!row) return;
            const block = inputEl.closest('.exercise-block');
            const exName = block.querySelector('.ex-select').value;
            const bar = parseFloat(block.querySelector('.bar-wt-in').value) || 0;
            const plates = parseFloat(row.querySelector('.wt-val').value) || 0;
            const reps = parseFloat(row.querySelector('.rep-val').value) || 0;
            const total = bar + plates;
            row.querySelector('.total-wt-display').textContent = total;
            row.querySelector('.plate-hint').textContent = calculatePlates(plates);
            if (reps > 0 && total > 0) {
                const est1RM = reps > 20 ? "Endurance" : Math.round(total * (1 + (reps / 30)));
                row.querySelector('.rm-display').textContent = reps > 20 ? est1RM : `Est. 1RM: ${est1RM}`;
            } else { row.querySelector('.rm-display').textContent = ""; }
            const displaySpan = row.querySelector('.total-wt-display');
            if (total > (personalBests[exName] || 0)) {
                displaySpan.className = "total-wt-display pb-glow";
                row.querySelector('.pb-badge').textContent = "⭐ PB";
            } else {
                displaySpan.className = "total-wt-display";
                displaySpan.style.color = "var(--green)";
                row.querySelector('.pb-badge').textContent = "";
            }
            calculateTotalVolume();
        }

        function calculateTotalVolume() {
            let total = 0;
            document.querySelectorAll('.exercise-block').forEach(block => {
                const bar = parseFloat(block.querySelector('.bar-wt-in').value) || 0;
                block.querySelectorAll('.set-row').forEach(row => {
                    total += (parseFloat(row.querySelector('.rep-val').value) || 0) * (bar + (parseFloat(row.querySelector('.wt-val').value) || 0));
                });
            });
            document.getElementById('totalVolumeDisplay').textContent = total.toLocaleString() + ' lbs';
            return total;
        }

        function addSetRow(list, reps = "", plates = "") {
            const s = document.createElement('div');
            s.className = 'set-row flex flex-column';
            s.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
            s.style.paddingBottom = "8px";
            s.innerHTML = `
                <div class="flex gap-2 items-center">
                    <button class="del-set-btn" onclick="this.closest('.set-row').remove(); calculateTotalVolume(); updateSetNumbers(this);">🗑️</button>
                    <span class="set-num" style="font-size: 10px; width: 20px; color: var(--text-muted);">#1</span>
                    <input type="number" placeholder="Reps" class="rep-val w-full" style="background:#111827;" oninput="refreshRowCalculation(this)">
                    <input type="number" placeholder="+Wt" class="wt-val w-full" style="background:#111827;" oninput="refreshRowCalculation(this)">
                    <div style="width: 70px; text-align: right; display:flex; flex-direction:column; align-items:flex-end;">
                        <div style="font-size: 11px; font-weight: bold;"><span class="total-wt-display">0</span> lbs</div>
                        <div class="pb-badge" style="font-size: 8px; color: var(--gold);"></div>
                    </div>
                    <button class="btn bg-blue" style="padding: 2px 8px; font-size:12px;" onclick="cloneThisSet(this)">+</button>
                </div>
                <div class="flex justify-between items-center" style="margin-top: 4px; padding-left: 20px;">
                    <div class="plate-hint" style="font-size: 8px; color: #60a5fa;"></div>
                    <div class="rm-display" style="font-size: 8px; color: var(--text-muted);"></div>
                </div>
            `;
            s.querySelector('.rep-val').value = reps;
            s.querySelector('.wt-val').value = plates;
            list.appendChild(s);
            updateSetNumbers(s);
            refreshRowCalculation(s.querySelector('.wt-val'));
            return s;
        }

        window.updateSetNumbers = (el) => {
            const list = el.closest ? el.closest('.sets-list') : el.parentElement;
            if(!list) return;
            list.querySelectorAll('.set-row').forEach((row, i) => { row.querySelector('.set-num').textContent = `#${i+1}`; });
        };

        window.cloneThisSet = (btn) => {
            const currentRow = btn.closest('.set-row');
            const list = currentRow.parentElement;
            addSetRow(list, currentRow.querySelector('.rep-val').value, currentRow.querySelector('.wt-val').value);
            calculateTotalVolume();
        };

        function updateGhostMemory(div, exName) {
            const mem = exerciseMemory[exName];
            const hintArea = div.querySelector('.memory-hint-area');
            const barIn = div.querySelector('.bar-wt-in');
            if (mem && exName) {
                const targetWeight = parseFloat(mem.lastPlates) + (parseFloat(mem.lastPlates) > 50 ? 5 : 2.5);
                hintArea.innerHTML = `<div class="memory-hint">Last: ${mem.lastPlates} lbs x ${mem.lastReps} (Bar: ${mem.lastBar})</div><div class="target-hint">Target: ${targetWeight} lbs</div>`;
                if (parseFloat(barIn.value) === 0) barIn.value = mem.lastBar;
            } else { hintArea.innerHTML = ""; }
        }

        function createExerciseSection(init = null) {
            const div = document.createElement('div');
            div.className = 'exercise-block card space-y-4';
            div.style.background = '#374151';
            div.innerHTML = `
                <div class="flex justify-between items-center gap-2">
                    <select class="ex-select w-full" style="background:#1f2937;"><option value="">-- Select Exercise --</option></select>
                    <button class="btn bg-red" style="padding: 4px 10px;" onclick="this.parentElement.parentElement.remove(); calculateTotalVolume();">✕</button>
                </div>
                <div class="memory-hint-area flex justify-between items-center" style="min-height:20px;"></div>
                <div class="flex items-center gap-4" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                    <div class="flex items-center gap-2">
                        <label style="font-size: 8px; text-transform: uppercase;">Bar/Sled Weight</label>
                        <input type="number" class="bar-wt-in" style="width: 80px; text-align: center;" value="0">
                    </div>
                </div>
                <div class="sets-list space-y-4" style="margin-top: 10px;"></div>
                <textarea placeholder="Notes..." class="notes-in w-full" style="height: 60px; font-size: 12px;"></textarea>
            `;
            const exSelect = div.querySelector('.ex-select');
            const barIn = div.querySelector('.bar-wt-in');
            const list = div.querySelector('.sets-list');
            const split = document.getElementById('workoutTypeSelect').value;
            (EXERCISE_GROUPS[split] || ALL_EXERCISES).sort(numSort).filter(ex => favorites.includes(ex)).forEach(ex => {
                const opt = document.createElement('option'); opt.value = opt.textContent = ex; exSelect.appendChild(opt);
            });
            exSelect.onchange = () => { updateGhostMemory(div, exSelect.value); div.querySelectorAll('.wt-val').forEach(i => refreshRowCalculation(i)); };
            barIn.oninput = () => div.querySelectorAll('.wt-val').forEach(i => refreshRowCalculation(i));
            if (init) {
                exSelect.value = init.name; barIn.value = init.barWeight || 0;
                init.setsData.forEach(s => addSetRow(list, s.reps, s.platesWeight));
                div.querySelector('.notes-in').value = init.notes || "";
                updateGhostMemory(div, init.name);
            } else { addSetRow(list); }
            return div;
        }

        document.getElementById('sortExercisesBtn').onclick = () => {
            const container = document.getElementById('exercisesContainer');
            const blocks = Array.from(container.querySelectorAll('.exercise-block'));
            blocks.sort((a, b) => (a.querySelector('.ex-select').value || "ZZZ").localeCompare(b.querySelector('.ex-select').value || "ZZZ", undefined, {numeric:true}));
            blocks.forEach(block => container.appendChild(block));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function getSessionSnapshot() {
            const data = [];
            document.querySelectorAll('.exercise-block').forEach(el => {
                const setsData = [];
                el.querySelectorAll('.set-row').forEach(s => { setsData.push({ reps: s.querySelector('.rep-val').value, platesWeight: s.querySelector('.wt-val').value }); });
                data.push({ name: el.querySelector('.ex-select').value, barWeight: el.querySelector('.bar-wt-in').value, notes: el.querySelector('.notes-in').value, setsData });
            });
            return data;
        }

        document.getElementById('saveCsvBtn').onclick = async () => {
            const data = getSessionSnapshot();
            const date = document.getElementById('workoutDateInput').value;
            const split = document.getElementById('workoutTypeSelect').value;
            const vol = calculateTotalVolume();

            data.forEach(ex => {
                if (ex.setsData.length > 0 && ex.name) {
                    const lastSet = ex.setsData[ex.setsData.length - 1];
                    exerciseMemory[ex.name] = { lastBar: ex.barWeight, lastPlates: lastSet.platesWeight, lastReps: lastSet.reps, date: date };
                }
                ex.setsData.forEach(s => {
                    const total = (parseFloat(ex.barWeight)||0) + (parseFloat(s.platesWeight)||0);
                    if (total > (personalBests[ex.name] || 0)) personalBests[ex.name] = total;
                });
            });

            localStorage.setItem('personalBests', JSON.stringify(personalBests));
            localStorage.setItem('exerciseMemory', JSON.stringify(exerciseMemory));
            localStorage.setItem('lastFullSnapshot', JSON.stringify(data));

            if (vol > 0) {
                const existingIdx = sessionHistory.findIndex(s => s.date === date);
                if (existingIdx !== -1) sessionHistory[existingIdx] = { date, split, volume: vol };
                else sessionHistory.push({ date, split, volume: vol });
                localStorage.setItem('workoutVolumeHistory', JSON.stringify(sessionHistory));
                updateHistoryTable();
            }

            const workoutJSON = {
                date: date,
                split: split,
                totalVolume: vol,
                exercises: data
            };

            const fileName = `Workout_${date}.json`;
            const jsonString = JSON.stringify(workoutJSON, null, 2);

            if (window.AndroidBridge && window.AndroidBridge.saveWorkoutJSON) {
                window.AndroidBridge.saveWorkoutJSON(jsonString, fileName);
                document.getElementById('autoSaveStatus').textContent = "Saved JSON via Bridge!";
            } else {
                let csv = "Date,Split,Exercise,Set,Reps,Bar,Plates,Total,Vol,Notes\n";
                data.forEach(ex => { ex.setsData.forEach((s, i) => {
                    const total = (parseFloat(ex.barWeight)||0) + (parseFloat(s.platesWeight)||0);
                    csv += `"${date}","${split}","${ex.name}","${i+1}","${s.reps}","${ex.barWeight}","${s.platesWeight}","${total}","${(parseFloat(s.reps)||0)*total}","${ex.notes.replace(/"/g, '""')}"\n`;
                });});

                try { await navigator.clipboard.writeText(csv); document.getElementById('autoSaveStatus').textContent = "Saved & Copied CSV!"; } catch(e) {}

                if (navigator.share) {
                    try { await navigator.share({ title: `Workout Log - ${date}`, text: csv }); } catch (err) { console.log("Share failed:", err); }
                } else if (window.AndroidBridge) {
                    window.AndroidBridge.shareCSV(csv);
                } else {
                    const container = document.getElementById('exportAreaContainer');
                    document.getElementById('csvOutputText').value = csv;
                    container.classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            }
        };

        document.getElementById('importCsvBtn').onclick = () => document.getElementById('csvFileInput').click();
        document.getElementById('csvFileInput').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const content = event.target.result;
                try {
                    if (file.name.endsWith('.json')) {
                        const imported = JSON.parse(content);
                        document.getElementById('workoutDateInput').value = imported.date;
                        document.getElementById('workoutTypeSelect').value = imported.split;
                        const container = document.getElementById('exercisesContainer');
                        container.innerHTML = '';
                        imported.exercises.forEach(ex => container.appendChild(createExerciseSection(ex)));
                        document.getElementById('sortExercisesBtn').click();
                        calculateTotalVolume();
                    } else {
                        const lines = content.split(/\r?\n/).filter(l => l.trim().length > 0);
                        const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                        const idx = { date: headers.indexOf('Date'), split: headers.indexOf('Split'), ex: headers.indexOf('Exercise'), reps: headers.indexOf('Reps'), bar: headers.indexOf('Bar'), plates: headers.indexOf('Plates'), notes: headers.indexOf('Notes') };
                        const imported = {};
                        for (let i = 1; i < lines.length; i++) {
                            const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/^"|"$/g, '').trim());
                            if (row.length < 5) continue;
                            const exName = row[idx.ex];
                            if (!imported[exName]) {
                                imported[exName] = { name: exName, barWeight: row[idx.bar] || 0, notes: row[idx.notes] || "", setsData: [] };
                                document.getElementById('workoutDateInput').value = row[idx.date];
                                document.getElementById('workoutTypeSelect').value = row[idx.split];
                            }
                            imported[exName].setsData.push({ reps: row[idx.reps], platesWeight: row[idx.plates] });
                        }
                        const container = document.getElementById('exercisesContainer'); container.innerHTML = '';
                        Object.values(imported).forEach(ex => container.appendChild(createExerciseSection(ex)));
                        document.getElementById('sortExercisesBtn').click(); calculateTotalVolume();
                    }
                    e.target.value = '';
                } catch (err) { alert("Import Error: " + err); }
            };
            reader.readAsText(file);
        };

        document.getElementById('addExerciseBtn').onclick = () => { document.getElementById('exercisesContainer').appendChild(createExerciseSection()); window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); };
        document.getElementById('loadLastBtn').onclick = () => {
            const last = JSON.parse(localStorage.getItem('lastFullSnapshot')); if (!last) return alert("No history.");
            document.getElementById('exercisesContainer').innerHTML = '';
            last.forEach(d => document.getElementById('exercisesContainer').appendChild(createExerciseSection(d)));
            document.getElementById('sortExercisesBtn').click(); calculateTotalVolume();
        };

        let timerInterval;
        function startTimer(s) {
            clearInterval(timerInterval); let t = s;
            const disp = document.getElementById('timerDisplay');
            const upd = () => {
                const m = Math.floor(t/60); const sec = t%60;
                disp.textContent = `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            };
            upd();
            timerInterval = setInterval(() => { t--; upd(); if(t<=0){ clearInterval(timerInterval); disp.textContent="DONE!"; }}, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); document.getElementById('timerDisplay').textContent = "00:00"; }

        function updateHistoryTable() {
            const b = document.getElementById('historyTableBody'); b.innerHTML = '';
            sessionHistory.slice(-5).reverse().forEach((s, i) => {
                const idx = sessionHistory.length - 1 - i;
                const row = document.createElement('tr');
                row.innerHTML = `<td style="color:var(--text-muted);">${s.date}</td><td>${s.split}</td><td class="text-right" style="color:var(--green); font-weight:bold;">${s.volume.toLocaleString()}</td><td class="text-right"><button onclick="deleteHistoryItem(${idx})" style="background:transparent; border:none; cursor:pointer;">🗑️</button></td>`;
                b.appendChild(row);
            });
        }
        window.deleteHistoryItem = (i) => { if(confirm("Delete?")){ sessionHistory.splice(i,1); localStorage.setItem('workoutVolumeHistory', JSON.stringify(sessionHistory)); updateHistoryTable(); }};

        window.onfocus = () => { document.getElementById('workoutDateInput').value = getTodayLocal(); };
        document.getElementById('toggleFavBtn').onclick = () => {
            const p = document.getElementById('favoritesPanel'); p.classList.toggle('collapsed');
            document.getElementById('favChevron').textContent = p.classList.contains('collapsed') ? '▼' : '▲';
        };

        function renderFavoritesGrid() {
            const grid = document.getElementById('favoritesGrid');
            grid.innerHTML = '';
            ALL_EXERCISES.sort(numSort).forEach(ex => {
                const d = document.createElement('div');
                d.innerHTML = `<label style="display:flex; align-items:center; gap:8px; cursor:pointer; padding:4px; border-radius:4px;"><input type="checkbox" ${favorites.includes(ex)?'checked':''}> ${ex}</label>`;
                d.querySelector('input').onchange = (e) => {
                    if(e.target.checked) {
                        if (!favorites.includes(ex)) favorites.push(ex);
                    } else {
                        favorites = favorites.filter(f => f !== ex);
                    }
                    localStorage.setItem('workoutFavorites', JSON.stringify(favorites));
                };
                grid.appendChild(d);
            });
        }

        window.onload = async () => {
            document.getElementById('workoutDateInput').value = getTodayLocal();
            await loadExerciseData();

            const recovery = localStorage.getItem('active_recovery_backup');
            if (recovery && confirm("Restore session?")) {
                const data = JSON.parse(recovery);
                document.getElementById('exercisesContainer').innerHTML = '';
                data.forEach(d => document.getElementById('exercisesContainer').appendChild(createExerciseSection(d)));
                document.getElementById('sortExercisesBtn').click();
            } else {
                document.getElementById('exercisesContainer').appendChild(createExerciseSection());
            }
            updateHistoryTable();
            calculateTotalVolume();
        };

        setInterval(() => {
            const data = getSessionSnapshot();
            if (data.length) {
                localStorage.setItem('active_recovery_backup', JSON.stringify(data));
                document.getElementById('autoSaveStatus').textContent = `Auto-saved: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            }
        }, 30000);
    </script>
</body>
</html>
